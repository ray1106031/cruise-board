name: cheongpyeong-board

on:
  schedule:
    - cron: "*/15 * * * *"   # 15분마다 (UTC 기준, 고부하 시 몇 분 지연될 수 있음)
  workflow_dispatch:          # 손으로 즉시 실행하는 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Korean font
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-nanum
          sudo fc-cache -f

      - name: Install deps
        run: pip install requests pillow

      - name: Generate board.png
        env:
          HRFCO_KEY: ${{ secrets.HRFCO_KEY }}   # GitHub 비밀금고에 넣은 인증키
        run: python promo_dam_board.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "update board $(date -u +%FT%TZ)" || exit 0
          git push
