<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- 브라우저 기본 자동 새로고침: 300초(5분)마다. TV 브라우저도 이건 따라옴 -->
<meta http-equiv="refresh" content="300">
<title>가평크루즈 + 청평댐 실시간</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#1B2A4A;overflow:hidden;}
  .wrap{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
  img{max-width:100%;max-height:100%;object-fit:contain;}
</style>
</head>
<body>
  <div class="wrap"><img id="board" src="board.png" alt="board"></div>
<script>
  // 5분마다 페이지를 통째로 새로고침 (가장 확실한 방식 - TV 브라우저도 따라옴)
  var REFRESH_MIN = 5;
  setTimeout(function(){ location.reload(true); }, REFRESH_MIN*60*1000);

  // 추가 안전장치: 이미지에 매번 다른 꼬리표를 붙여 캐시 무시
  (function(){
    var img = document.getElementById('board');
    function bust(){ img.src = 'board.png?t=' + new Date().getTime(); }
    bust();
    setInterval(bust, REFRESH_MIN*60*1000);
  })();
</script>
</body>
</html>
