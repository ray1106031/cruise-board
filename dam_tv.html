<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>가평크루즈 프로모션 + 청평댐 실시간</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#1B2A4A; overflow:hidden; }
  .wrap { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  img { max-width:100%; max-height:100%; object-fit:contain; }
</style>
</head>
<body>
  <div class="wrap"><img id="board" src="board.png" alt="board"></div>
<script>
  const SRC = "board.png";
  const REFRESH_MS = 15 * 60 * 1000;          // 15분마다 새 이미지
  function refresh(){ document.getElementById("board").src = SRC + "?t=" + Date.now(); }
  setInterval(refresh, REFRESH_MS);
  setInterval(() => location.reload(), 60 * 60 * 1000);  // 1시간마다 페이지 통째 새로고침
</script>
</body>
</html>
